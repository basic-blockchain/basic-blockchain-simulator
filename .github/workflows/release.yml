name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Prefer docs/releases/<tag>.md if present so the GitHub Release body
          # is the curated notes the team writes per version. Fall back to the
          # auto-generated PR list only when no notes file exists, so older /
          # untagged-locally pushes still produce a non-empty Release body.
          notes_file="docs/releases/${REF_NAME}.md"
          if [ -f "$notes_file" ]; then
            gh release create "$REF_NAME" \
              --title "$REF_NAME" \
              --notes-file "$notes_file"
          else
            gh release create "$REF_NAME" \
              --title "$REF_NAME" \
              --generate-notes
          fi
