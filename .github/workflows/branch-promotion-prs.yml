name: Branch Promotion PR Chain

on:
  push:
    branches:
      - production
      - staging
      - qa
  workflow_dispatch:
    inputs:
      source:
        description: Source branch
        required: true
        type: string
      target:
        description: Target branch
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  promote-production-to-main:
    if: github.event_name == 'push' && github.ref_name == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Create PR production -> main
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = 'production';
            const base = 'main';
            const title = 'Promote production into main';
            const body = 'Automated promotion PR from production to main.';

            const { data: existing } = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:${head}`, base
            });
            if (existing.length > 0) {
              core.info(`Open PR already exists: #${existing[0].number}`);
              return;
            }

            try {
              await github.rest.pulls.create({ owner, repo, head, base, title, body });
            } catch (err) {
              if (err.status === 422) {
                core.info(`No commits between ${head} and ${base} — branches are in sync, skipping PR creation.`);
              } else {
                throw err;
              }
            }

  promote-production-to-staging:
    if: github.event_name == 'push' && github.ref_name == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Create PR production -> staging
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = 'production';
            const base = 'staging';
            const title = 'Promote production into staging';
            const body = 'Automated promotion PR from production to staging.';

            const { data: existing } = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:${head}`, base
            });
            if (existing.length > 0) {
              core.info(`Open PR already exists: #${existing[0].number}`);
              return;
            }

            try {
              await github.rest.pulls.create({ owner, repo, head, base, title, body });
            } catch (err) {
              if (err.status === 422) {
                core.info(`No commits between ${head} and ${base} — branches are in sync, skipping PR creation.`);
              } else {
                throw err;
              }
            }

  promote-staging-to-qa:
    if: github.event_name == 'push' && github.ref_name == 'staging'
    runs-on: ubuntu-latest
    steps:
      - name: Create PR staging -> qa
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = 'staging';
            const base = 'qa';
            const title = 'Promote staging into qa';
            const body = 'Automated promotion PR from staging to qa.';

            const { data: existing } = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:${head}`, base
            });
            if (existing.length > 0) {
              core.info(`Open PR already exists: #${existing[0].number}`);
              return;
            }

            try {
              await github.rest.pulls.create({ owner, repo, head, base, title, body });
            } catch (err) {
              if (err.status === 422) {
                core.info(`No commits between ${head} and ${base} — branches are in sync, skipping PR creation.`);
              } else {
                throw err;
              }
            }

  promote-qa-to-develop:
    if: github.event_name == 'push' && github.ref_name == 'qa'
    runs-on: ubuntu-latest
    steps:
      - name: Create PR qa -> develop
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = 'qa';
            const base = 'develop';
            const title = 'Promote qa into develop';
            const body = 'Automated promotion PR from qa to develop.';

            const { data: existing } = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:${head}`, base
            });
            if (existing.length > 0) {
              core.info(`Open PR already exists: #${existing[0].number}`);
              return;
            }

            try {
              await github.rest.pulls.create({ owner, repo, head, base, title, body });
            } catch (err) {
              if (err.status === 422) {
                core.info(`No commits between ${head} and ${base} — branches are in sync, skipping PR creation.`);
              } else {
                throw err;
              }
            }

  manual-promotion:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Create manual promotion PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = '${{ github.event.inputs.source }}';
            const base = '${{ github.event.inputs.target }}';
            const title = `Promote ${head} into ${base}`;
            const body = `Manual promotion PR from ${head} to ${base}.`;

            const { data: existing } = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:${head}`, base
            });
            if (existing.length > 0) {
              core.info(`Open PR already exists: #${existing[0].number}`);
              return;
            }

            try {
              await github.rest.pulls.create({ owner, repo, head, base, title, body });
            } catch (err) {
              if (err.status === 422) {
                core.info(`No commits between ${head} and ${base} — branches are in sync, skipping PR creation.`);
              } else {
                throw err;
              }
            }
